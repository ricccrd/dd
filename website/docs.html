<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script>
// Docs registry. Each file is copied next to this page (./docs/*.md) by the Pages workflow.
const DOCS = [
  { id: "README",        file: "README.md",        title: "Overview" },
  { id: "CLI",           file: "CLI.md",           title: "Command-line (ddcli)" },
  { id: "SYSCALLS",      file: "SYSCALLS.md",      title: "Syscalls" },
  { id: "OPTIMIZATIONS", file: "OPTIMIZATIONS.md", title: "Optimizations" },
  { id: "RENDERING",     file: "RENDERING.md",     title: "GUI rendering (design)" },
  { id: "RENDERING_PLAN",file: "RENDERING_PLAN.md",title: "GUI rendering plan" },
  { id: "PLAN",          file: "PLAN.md",          title: "Roadmap" },
];

const nav = document.getElementById("doc-nav");
const content = document.getElementById("doc-content");

DOCS.forEach(d => {
  const a = document.createElement("a");
  a.textContent = d.title;
  a.href = "?doc=" + d.id;
  a.dataset.id = d.id;
  nav.appendChild(a);
});

marked.setOptions({
  highlight: (code, lang) => {
    try {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    } catch (e) { return code; }
  },
});

function current() {
  const q = new URLSearchParams(location.search).get("doc");
  return DOCS.find(d => d.id === q) || DOCS[0];
}

async function render() {
  const doc = current();
  document.querySelectorAll("#doc-nav a").forEach(a =>
    a.classList.toggle("active", a.dataset.id === doc.id));
  document.title = "dd — " + doc.title;
  try {
    const res = await fetch("./docs/" + doc.file);
    if (!res.ok) throw new Error(res.status);
    let md = await res.text();
    // README links to ./dd-jit/... etc. — point those at the GitHub repo.
    content.innerHTML = marked.parse(md);
    content.querySelectorAll("pre code").forEach(b => { try { hljs.highlightElement(b); } catch (e) {} });
    window.scrollTo(0, 0);
  } catch (e) {
    content.innerHTML = "<h1>" + doc.title + "</h1><p style='color:var(--muted)'>Could not load <code>"
      + doc.file + "</code>. View it on <a href='https://github.com/ricccrd/dd/tree/main/docs'>GitHub</a>.</p>";
  }
}

window.addEventListener("popstate", render);
document.getElementById("doc-nav").addEventListener("click", e => {
  const a = e.target.closest("a"); if (!a) return;
  e.preventDefault(); history.pushState({}, "", a.href); render();
});
render();
</script>
</body>
</html>
