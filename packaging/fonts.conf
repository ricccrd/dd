<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Minimal fontconfig for the bundled app: catalog the macOS system fonts and keep a writable
     per-user cache so first launch isn't slow. -->
<fontconfig>
  <dir>/System/Library/Fonts</dir>
  <dir>/Library/Fonts</dir>
  <dir prefix="xdg">fonts</dir>
  <dir>~/Library/Fonts</dir>
  <cachedir>~/.cache/dd/fontconfig</cachedir>
  <config>
    <rejectfont><glob>/System/Library/Fonts/LastResort.otf</glob></rejectfont>
  </config>
</fontconfig>
